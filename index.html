<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>전자지갑 자격증 클론 - 개선판</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="phone" aria-label="전자지갑 모바일 화면">
    <header class="topbar">전자지갑</header>

    <section class="screen active" id="screen-list" data-screen>
      <div class="section-title">나의 자격증</div>

      <article class="issuer-card">
        <div class="issuer-logo-wrap">
          <div class="issuer-logo">HRDK</div>
        </div>
        <div class="issuer-name">한국산업인력공단</div>
      </article>

      <div class="tabs" role="tablist" aria-label="자격증 상태 탭">
        <button class="tab active" data-tab="kept">보관</button>
        <button class="tab" data-tab="issued">발급</button>
      </div>

      <p class="notice">
        모바일 국가기술자격증은 <strong>공단이 시행한 국가기술자격 취득자 중 공단에서 확인한 사진이 등록된 자</strong>에 한하여 발급이 가능합니다.
      </p>

      <label class="search">
        <input type="text" id="searchInput" placeholder="자격증 검색" aria-label="자격증 검색" />
        <span>⌕</span>
      </label>

      <div class="filter-row">
        <button class="select" id="sortBtn">합격일순⌄</button>
        <button class="edit">편집</button>
      </div>

      <div class="cert-list" id="certList"></div>
    </section>

    <section class="screen" id="screen-front" data-screen>
      <button class="icon-btn refresh" id="toBackBtn" aria-label="후면 보기">⟳</button>
      <article class="cert-card card-enter" id="frontCard"></article>
      <div class="action-row sticky-actions">
        <button class="close grow" id="closeFrontBtn">닫기</button>
        <button class="primary grow" id="issueBtn">발급</button>
      </div>
    </section>

    <section class="screen" id="screen-back" data-screen>
      <button class="icon-btn refresh" id="toFrontBtn" aria-label="전면 보기">⟳</button>
      <article class="cert-card back-card card-enter" id="backCard"></article>
      <div class="action-row sticky-actions single">
        <button class="close full" id="closeBackBtn">닫기</button>
      </div>
    </section>

    <section class="screen" id="screen-detail" data-screen>
      <button class="icon-btn refresh" id="detailBackBtn" aria-label="전면으로 돌아가기">⟳</button>
      <article class="detail-card card-enter" id="detailCard"></article>
    </section>

    <nav class="bottom-nav" aria-label="하단 메뉴">
      <button type="button">⌂<span>홈</span></button>
      <button type="button">♙<span>마이</span></button>
      <button type="button" class="main-btn">Q<span>지갑</span></button>
      <button type="button">↪<span>로그아웃</span></button>
      <button type="button">☰<span>메뉴</span></button>
    </nav>
  </main>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h2 id="modalTitle">알림</h2>
      <p>발급이 완료되었습니다.</p>
      <button id="confirmIssue">확인</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
